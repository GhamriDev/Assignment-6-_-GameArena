<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="CSS/bootstrap.min.css">
    <script src="https://kit.fontawesome.com/70b22805cc.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/Queries.css">
    <title>GameArena</title>
</head>

<body>

    <!-- <header></header> -->

    <!--Home Section End  -->
    <div id="home" class="container-fluid">
        <div
            class="container height-100 d-flex justify-content-center flex-md-row align-items-md-center justify-content-md-around">
            <section class="home-content text-white col-lg-5 ">
                <h1 class="home-title mb-3">
                    THE ULTIMATE <br>
                    <span class="text-special">GAMING</span> <br>
                    EXPERIENCE
                </h1>
                <p class="home-paragraph mb-3 text">
                    Join millions of gamers worldwide in the most competitive eSports tournaments. Experience next-level
                    gaming with
                    cutting-edge technology and endless possibilities.
                </p>
                <div class="home-btns d-flex flex-column flex-md-row justify-content-md-start gap-md-3">
                    <button class="btn text-black bg-special mt-sm-4 mb-3">Start Gaming Now</button>
                    <button class="btn text-special watch-now mt-sm-4 mb-3">Watch
                        Tournaments</button>

                </div>
            </section>
            <section class="home-img col-lg-5 mt-sm-5">
                <div class="home-img rounded-4 position-relative">
                    <!-- <img src="images/02_PC_Gaming.png" alt="Gaming Setup"> -->
                    <div class="position-absolute p-md-4 fa-text-height d-flex flex-row align-items-center ">
                        <i class="fa-solid fa-trophy text-special"></i>
                        <span class="act-pl ms-2" style="background-color: #0B0E13;color: var(--mainColor);">Active
                            Players
                            <br> <b style="font-size: 1.5rem;">+2.5M</b> </span>

                    </div>
                </div>
            </section>
        </div>
    </div>
    <!--Home Section Start-->

    </main> -->




    <script src="JS/bootstrap.bundle.js"></script>
</body>

</html>
